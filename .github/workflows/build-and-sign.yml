name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Build Release
      run: cargo build --release
    
    - name: Create Release Package
      run: |
        $version = (Get-Content Cargo.toml | Select-String 'version = "([^"]+)"').Matches.Groups[1].Value
        $dist = "irisnote-$version-windows-x64"
        New-Item -ItemType Directory -Path $dist -Force
        Copy-Item target/release/irisnote.exe $dist/
        Copy-Item README.md $dist/ -ErrorAction SilentlyContinue
        Copy-Item README_EN.md $dist/ -ErrorAction SilentlyContinue
        Copy-Item LICENSE $dist/ -ErrorAction SilentlyContinue
        Compress-Archive -Path $dist -DestinationPath "$dist.zip"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: irisnote-windows
        path: irisnote-*.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: irisnote-*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
